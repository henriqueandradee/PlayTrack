# yt-dlp configuration file
# Localizado em: ~/.config/yt-dlp/yt-dlp.conf

# Socket timeout para evitar travamentos
socket-timeout=30

# Rate limiting agressivo para evitar erro 429 (Too Many Requests)
sleep-interval=15
sleep-requests=3

# Retries automáticos com espera maior
retries=7
retry-sleep=30

# Headers realistas para contornar bloqueios
user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36

# Contornar bloqueios geográficos e certificados
geo-bypass=true
no-check-certificate=true

# Usar Node.js para JavaScript extraction do YouTube
extractor-args=youtube:js_runtimes=node

# Downloader preferences
prefer-ffmpeg=true

# Output format
merge-output-format=mp4
