# yt-dlp configuration file
# Socket timeout
socket-timeout=30

# Rate limiting EXTREMAMENTE agressivo para evitar bloqueios do YouTube
# Esperar 30 segundos entre requisições e 60 segundos entre retries
sleep-interval=30
sleep-requests=5
retries=10
retry-sleep=60

# User agent realista
user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36

# Contornar bloqueios
geo-bypass=true
no-check-certificate=true

# Usar Node.js como JS runtime para YouTube extraction
extractor-args=youtube:js_runtimes=node

# Downloader preferences
prefer-ffmpeg=true
merge-output-format=mp4
