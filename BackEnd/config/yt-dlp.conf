# yt-dlp configuration file
# Localizado em: ~/.config/yt-dlp/yt-dlp.conf

# Socket timeout para evitar travamentos
socket-timeout=30

# Rate limiting para evitar erro 429 (Too Many Requests)
sleep-interval=5
sleep-requests=2

# Retries automáticos
retries=5
retry-sleep=10

# User agent para contornar bloqueios
user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36

# Usar Deno para JavaScript extraction do YouTube
extractor-args=youtube:js_runtimes=deno

# Downloader preferences
prefer-ffmpeg=true

# Output format
merge-output-format=mp4
